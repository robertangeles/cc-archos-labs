name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref — saves Actions minutes when a dev
# pushes a fixup commit while the previous CI run is still in flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so the migration-safety scanner can diff
          # against origin/main to find migrations added on this branch.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fast-fail before the heavier steps. Reads GITHUB_EVENT_PATH for
      # the 'migration-destructive' label so manually-overridden PRs
      # pass without re-running the workflow.
      - name: Migration safety check
        run: node scripts/_check-migration-safety.mjs --ci

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
